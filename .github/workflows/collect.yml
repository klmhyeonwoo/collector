name: Collect Tech Trends

on:
  schedule:
    - cron: "0 15 * * *"  # 매일 00:00 KST (UTC 15:00)
  workflow_dispatch:       # 수동 실행 버튼

jobs:
  collect:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      # 1. Gemini로 신규 기술 발견 → domains.json 업데이트
      - name: Discover new techs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run discover

      # 2. 업데이트된 domains.json 기준으로 메트릭 수집
      - name: Collect metrics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run collect

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/trends.json data/domains.json
          git diff --cached --quiet || git commit -m "chore: update tech trends $(date +'%Y-%m-%d')"
          git push
